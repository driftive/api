version: '3.7'
services:
  driftive:
    image: ghcr.io/driftive/api:0.1
    build:
      context: .
      dockerfile: Dockerfile.multi-stage
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: driftive
      DB_PASSWORD: driftive
      DB_NAME: driftive
      AUTO_MIGRATE: "true"
      JWT_SECRET: local-dev-secret-change-me-32-chars-min
    ports:
      - "3000:3000"
#    volumes:
#      - ./example.compose.config.yml:/app/config.yml
    command:
      - /app/driftive
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: driftive
      POSTGRES_PASSWORD: driftive
      POSTGRES_DB: driftive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftive -d driftive"]
      interval: 5s
      timeout: 5s
      retries: 10
